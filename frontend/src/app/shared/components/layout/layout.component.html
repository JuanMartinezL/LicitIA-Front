<div class="layout-container">

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <div class="logo">
        <mat-icon>gavel</mat-icon>
        <span class="logo-text">LicitIA</span>
      </div>
      <button mat-icon-button (click)="toggleSidebar()" class="collapse-btn">
        <mat-icon>{{ sidebarCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" matTooltip="Dashboard" [matTooltipDisabled]="!sidebarCollapsed">
        <mat-icon>dashboard</mat-icon>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/licitaciones" routerLinkActive="active" class="nav-item" matTooltip="Licitaciones" [matTooltipDisabled]="!sidebarCollapsed">
        <mat-icon>search</mat-icon>
        <span class="nav-label">Licitaciones</span>
      </a>
      <a routerLink="/prediccion" routerLinkActive="active" class="nav-item" matTooltip="Analizar" [matTooltipDisabled]="!sidebarCollapsed">
        <mat-icon>analytics</mat-icon>
        <span class="nav-label">Analizar</span>
      </a>
      <a routerLink="/perfil" routerLinkActive="active" class="nav-item" matTooltip="Mi Empresa" [matTooltipDisabled]="!sidebarCollapsed">
        <mat-icon>business</mat-icon>
        <span class="nav-label">Mi Empresa</span>
      </a>
      <a routerLink="/asistente" routerLinkActive="active" class="nav-item" matTooltip="Asistente IA" [matTooltipDisabled]="!sidebarCollapsed">
        <mat-icon>smart_toy</mat-icon>
        <span class="nav-label">Asistente IA</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" *ngIf="!sidebarCollapsed">
        <mat-icon>account_circle</mat-icon>
        <div class="user-data">
          <span class="user-name">{{ usuario()?.nombre }}</span>
          <span class="user-empresa">{{ usuario()?.empresa }}</span>
        </div>
      </div>
      <button mat-icon-button (click)="logout()" matTooltip="Cerrar sesión" class="logout-btn">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
